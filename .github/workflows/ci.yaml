name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: juliendelavande

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cpu_whisper
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cpu-whisper:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/cpu-whisper:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  push-chart:
    runs-on: ubuntu-latest
    needs: build-image
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Login to GHCR OCI
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package chart/
          CHART_PKG=$(ls *.tgz)
          helm push "$CHART_PKG" oci://${{ env.REGISTRY }}/${{ env.OWNER }}/charts
